# Merge after config.yaml for the local OSS stack. The policy processors remain
# identical; only each signal's sole local destination changes.

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  prometheus:
    endpoint: 0.0.0.0:9464
    enable_open_metrics: true
    add_metric_suffixes: false
  otlphttp/loki:
    endpoint: http://loki:3100/otlp

service:
  telemetry:
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
  pipelines:
    traces:
      exporters: [otlp/tempo]
    metrics:
      exporters: [prometheus]
    logs:
      exporters: [otlphttp/loki]


name: otel-collector-platform

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.156.0
    command:
      - --config=/etc/otelcol-contrib/config.yaml
      - --config=/etc/otelcol-contrib/local-overrides.yaml
    environment:
      OTEL_COLLECTOR_BEARER_TOKEN: ${OTEL_COLLECTOR_BEARER_TOKEN:-local-platform-token-32-characters}
      # Base cloud exporter is replaced by local-overrides but its component
      # still resolves environment placeholders during config loading.
      GRAFANA_CLOUD_OTLP_ENDPOINT: https://unused.invalid/otlp
      GRAFANA_CLOUD_INSTANCE_ID: unused
      GRAFANA_CLOUD_TOKEN: unused
      GRAFANA_CLOUD_AUTH_HEADER: "Basic dW51c2VkOnVudXNlZA=="
    volumes:
      - ./collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - ./collector/local-overrides.yaml:/etc/otelcol-contrib/local-overrides.yaml:ro
    ports:
      - "127.0.0.1:4318:4318"
      - "127.0.0.1:13133:13133"
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "--version"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      prometheus: { condition: service_healthy }
      tempo: { condition: service_healthy }
      loki: { condition: service_healthy }
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.13.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./local/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring:/etc/prometheus/platform-rules:ro
      - ./local/producer:/etc/prometheus/producer-rules:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.10.7
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./local/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    healthcheck:
      test: ["CMD", "/tempo", "-version"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  loki:
    image: grafana/loki:3.7.3
    command: ["-config.file=/etc/loki/loki.yaml", "-target=all"]
    volumes:
      - ./local/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD", "/usr/bin/loki", "-version"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:13.0.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./local/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./local/producer:/var/lib/grafana/producer:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3002:3000"
    depends_on:
      prometheus: { condition: service_healthy }
      tempo: { condition: service_healthy }
      loki: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  prometheus-data:
  tempo-data:
  loki-data:
  grafana-data:


# Generic central gateway policy. Keep this file application-neutral.
#
# Pipeline order is intentional:
#   memory_limiter -> admission filter (metrics) -> sanitation -> normalization
#   -> batch -> one OTLP backend

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  bearertokenauth/ingest:
    scheme: Bearer
    token: ${env:OTEL_COLLECTOR_BEARER_TOKEN}
  basicauth/backend:
    client_auth:
      username: ${env:GRAFANA_CLOUD_INSTANCE_ID}
      password: ${env:GRAFANA_CLOUD_TOKEN}

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
        auth:
          authenticator: bearertokenauth/ingest

processors:
  # First in every pipeline. 384 MiB is 75% of the 512 MiB Cloud Run limit;
  # the spike allowance starts shedding before the process reaches its cgroup.
  memory_limiter:
    check_interval: 1s
    limit_mib: 384
    spike_limit_mib: 96

  # A Collector cannot know global distinct-series cardinality while handling
  # one request. These rules reject deterministic per-datapoint hazards. The
  # processor's own filtered-datapoint metric is the bounded rejection signal.
  filter/metric_admission:
    error_mode: ignore
    metrics:
      datapoint:
        - resource.attributes["service.name"] == nil
        - resource.attributes["service.name"] == ""
        - IsMatch(resource.attributes["service.name"], "^unknown_service(:.*)?$")
        - Len(resource.attributes["service.name"]) > 64
        - Len(resource.attributes) > 24
        - resource.attributes["user.id"] != nil
        - resource.attributes["user.email"] != nil
        - resource.attributes["enduser.id"] != nil
        - resource.attributes["session.id"] != nil
        - resource.attributes["request.id"] != nil
        - resource.attributes["url.full"] != nil
        - resource.attributes["url.query"] != nil
        - resource.attributes["db.statement"] != nil
        - Len(attributes) > 16
        - attributes["user.id"] != nil
        - attributes["user.email"] != nil
        - attributes["enduser.id"] != nil
        - attributes["session.id"] != nil
        - attributes["request.id"] != nil
        - attributes["client.id"] != nil
        - attributes["email"] != nil
        - attributes["url.full"] != nil
        - attributes["url.query"] != nil
        - attributes["http.url"] != nil
        - attributes["http.target"] != nil
        - attributes["exception.message"] != nil
        - attributes["db.statement"] != nil
        - attributes["messaging.message.id"] != nil
        - attributes["http.route"] != nil and Len(attributes["http.route"]) > 128
        - attributes["error.type"] != nil and Len(attributes["error.type"]) > 128
        - attributes["server.address"] != nil and Len(attributes["server.address"]) > 128

  # Defense-in-depth denylist. Producers still own source-side privacy.
  attributes/sanitize:
    actions:
      - { key: authorization, action: delete }
      - { key: http.request.header.authorization, action: delete }
      - { key: http.request.header.cookie, action: delete }
      - { key: http.response.header.set-cookie, action: delete }
      - { key: user.id, action: delete }
      - { key: user.email, action: delete }
      - { key: enduser.id, action: delete }
      - { key: session.id, action: delete }
      - { key: request.id, action: delete }
      - { key: email, action: delete }
      - { key: url.full, action: delete }
      - { key: url.query, action: delete }
      - { key: url.fragment, action: delete }
      - { key: http.url, action: delete }
      - { key: http.target, action: delete }
      - { key: exception.message, action: delete }
      - { key: exception.stacktrace, action: delete }
      - { key: db.statement, action: delete }
      - { key: messaging.message.body, action: delete }

  resource/sanitize:
    attributes:
      - { key: authorization, action: delete }
      - { key: user.id, action: delete }
      - { key: user.email, action: delete }
      - { key: enduser.id, action: delete }
      - { key: session.id, action: delete }
      - { key: request.id, action: delete }
      - { key: url.full, action: delete }
      - { key: url.query, action: delete }
      - { key: db.statement, action: delete }

  transform/normalize:
    error_mode: ignore
    trace_statements:
      - context: resource
        statements:
          - truncate_all(attributes, 256)
      - context: span
        statements:
          - replace_pattern(attributes["http.route"], "\\?.*$", "")
          - set(status.message, "") where status.code == STATUS_CODE_ERROR
          - truncate_all(attributes, 256)
    metric_statements:
      - context: resource
        statements:
          - truncate_all(attributes, 256)
      - context: datapoint
        statements:
          - replace_pattern(attributes["http.route"], "\\?.*$", "")
          - truncate_all(attributes, 128)
    log_statements:
      - context: resource
        statements:
          - truncate_all(attributes, 256)
      - context: log
        statements:
          - replace_pattern(attributes["http.route"], "\\?.*$", "")
          - truncate_all(attributes, 256)

  batch:
    send_batch_size: 256
    send_batch_max_size: 512
    timeout: 1s

exporters:
  otlphttp/backend:
    endpoint: ${env:GRAFANA_CLOUD_OTLP_ENDPOINT}
    auth:
      authenticator: basicauth/backend
    sending_queue:
      enabled: true
      num_consumers: 2
      queue_size: 1024
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 10s
      max_elapsed_time: 30s

service:
  extensions: [health_check, bearertokenauth/ingest, basicauth/backend]
  telemetry:
    resource:
      service.name: otel-collector-platform
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
        # Collector self-telemetry uses the SDK OTLP exporter, which does not
        # append /v1/metrics to the Grafana Cloud base URL (unlike otlphttp).
        - periodic:
            interval: 30000
            exporter:
              otlp:
                protocol: http/protobuf
                endpoint: ${env:GRAFANA_CLOUD_OTLP_ENDPOINT}/v1/metrics
                headers:
                  - name: Authorization
                    value: ${env:GRAFANA_CLOUD_AUTH_HEADER}
  pipelines:
    traces:
      receivers: [otlp]
      processors:
        [memory_limiter, attributes/sanitize, resource/sanitize, transform/normalize, batch]
      exporters: [otlphttp/backend]
    metrics:
      receivers: [otlp]
      processors:
        [memory_limiter, filter/metric_admission, attributes/sanitize, resource/sanitize, transform/normalize, batch]
      exporters: [otlphttp/backend]
    logs:
      receivers: [otlp]
      processors:
        [memory_limiter, attributes/sanitize, resource/sanitize, transform/normalize, batch]
      exporters: [otlphttp/backend]
